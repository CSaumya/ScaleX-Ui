<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>ScaleX</title>
</head>
<body>
    <nav class="navbar">
        <p>ScaleX</p>
        <ul>
            <li>Home</li>
            <li>About Us</li>
            <li>Blogs</li>
            <li>Contact Us</li>
        </ul>
        <button class="nav-btn">Get Started</button>
    </nav>

    <div class="main-title">
        <h1>Insights & Blogs</h1>
    </div>

    <div class="filters">
        <ul class="filters-list">
            <li class="item-1">All</li>
            <li class="item-2">Tech</li>
            <li class="item-2">Saas</li>
            <li class="item-2">Marketing</li>

        </ul>
    </div>

    <div class="cards">
        <div class="blog-card">
            <img src="/Assets/Scalex-1.jpg" alt="">
            <div class="blog-txt">
            <p class="blog-tag">Tech</p>
            <h3>The Ultimate Guide To Saas Marketing</h3>
            <p class="blog-date">May 23, 2025</p>
            </div>  
        </div>

        <div class="blog-card">
            <img src="/Assets/Scalex-2.jpg" alt="">
            <div class="blog-txt">
            <p class="blog-tag">Saas</p>
            <h3>5 Key Trends In Saas Growth For 2025</h3>
            <p class="blog-date">May 23, 2025</p>
            </div>  
        </div>

        <div class="blog-card">
            <img src="/Assets/Scalex-3.webp" alt="">
            <div class="blog-txt">
            <p class="blog-tag">Marketing</p>
            <h3>How Data-Driven Strategies Are Important</h3>
            <p class="blog-date">May 23, 2025</p>
            </div>  
        </div>
    </div>

</body>
